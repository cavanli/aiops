<h2>导航菜单范围确认</h2>
<p class="subtitle">MVP v1.0 前端包含哪些一级菜单项？</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>5 个功能模块（PRD MVP 原版）</h3>
      <p>概览 / 主机管理 / 模型广场 / 工作流 / 部署执行</p>
      <p style="color:#64748b;font-size:13px;">用户管理放在顶部 Header 下拉或单独系统设置页</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>6 个功能模块（含用户管理）</h3>
      <p>概览 / 主机管理 / 模型广场 / 工作流 / 部署执行 / 系统管理</p>
      <p style="color:#64748b;font-size:13px;">系统管理下含：用户管理、角色权限、审计日志</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>4 个功能模块（精简版）</h3>
      <p>概览 / 主机管理 / 模型广场 / 工作流 + 部署（合并）</p>
      <p style="color:#64748b;font-size:13px;">工作流和部署执行合并为一个"自动化"模块</p>
    </div>
  </div>
</div>
